name: cd

on:
  push:
    branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
        - name: Check out code
          uses: actions/checkout@v4

        - name: Set up Go
          uses: actions/setup-go@v5
          with:
            go-version: "1.25.1"
        
        - name: Build Prod
          run: ./scripts/buildprod.sh

        - name: 'Set up Cloud SDK'
          uses: 'google-github-actions/setup-gcloud@v3'
          with:
            service_account_key: ${{ secrets.GCP_CREDENTIALS }}
        
        - name: Build Docker Image
          run:  gcloud builds submit --tag us-central1-docker.pkg.dev/notely-493900/notely-ar-repo/notely-app:v1 .